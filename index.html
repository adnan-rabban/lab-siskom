<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Virtual Engineering Laboratory Simulator — Interactive PUDAK Scientific PTE-series module simulations for online telecommunications and signal processing practicals." />
    <meta name="theme-color" content="#0C0C0C" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Virtual Lab Engineering" />
    <title>Laboratorium Teknik Virtual — PUDAK Scientific Simulator</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Font Loading: Optimized ── -->
    <!-- DNS prefetch + preconnect for Google Fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical font: Inter — preloaded with display=swap for fast FCP -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Material Symbols: deferred loading (non-critical, only used in some components) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" /></noscript>

    <style>
      /* Prevent FOUC */
      html { background: #0C0C0C; }
      body { opacity: 0; transition: opacity 0.2s; }
      body.loaded { opacity: 1; }

      /* ── Mobile Guard: Sticky screen for mobile users ── */
      .mobile-guard {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0C0C0C;
        color: #F0EFE8;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      .mobile-guard-icon {
        font-size: 48px;
        margin-bottom: 24px;
        opacity: 0.6;
      }
      .mobile-guard h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }
      .mobile-guard p {
        font-size: 0.875rem;
        color: rgba(240, 239, 232, 0.5);
        line-height: 1.6;
        max-width: 320px;
      }
      .mobile-guard-badge {
        margin-top: 20px;
        font-size: 0.6875rem;
        font-weight: 500;
        color: #FF5C00;
        background: rgba(255, 92, 0, 0.1);
        border: 1px solid rgba(255, 92, 0, 0.2);
        padding: 4px 12px;
        border-radius: 4px;
        letter-spacing: 0.04em;
      }
      /* Show mobile guard only on screens < 768px (portrait phones) */
      @media (max-width: 767px) {
        .mobile-guard { display: flex; }
        #root { display: none !important; }
      }
    </style>
  </head>
  <body>
    <!-- Mobile Guard Screen -->
    <div class="mobile-guard" id="mobile-guard" role="alert">
      <div class="mobile-guard-icon">🖥️</div>
      <h2>Desktop atau Tablet Diperlukan</h2>
      <p>
        Virtual Laboratory Simulator membutuhkan layar yang lebih besar untuk pengalaman terbaik.
        Silakan buka pada desktop atau tablet (landscape).
      </p>
      <p style="margin-top: 8px; font-size: 0.75rem;">
        Desktop or tablet required for the best experience.
        Please open on a larger screen.
      </p>
      <div class="mobile-guard-badge">Min. 768px viewport width</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Mark body as loaded after first paint
      window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => document.body.classList.add('loaded'));
      });
    </script>
  </body>
</html>
